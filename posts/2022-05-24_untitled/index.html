tags/Poem/">Poem</a> </div> <div class="post-content">  <p>喜欢一人<br>
伸出灵魂触及<br>
枝蔓缠绕<br>
断开时刻<br>
丢失亦获得些许肢体</p>
<p>故园土地<br>
根深埋地底<br>
移居他所<br>
非昔日水与气</p>
<p>分离<br>
​习惯了<br>
只是平常而已</p>  </div> </article>  </main> <footer class="footer"> <span>Field notes and essays on life, software, and tiny rituals.</span> <span>Copyright 2026 Zhang Hua Feng/張華楓&#39;s Notes</span> </footer> </div> </body></html>
