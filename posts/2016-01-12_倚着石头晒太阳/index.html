nuary 12, 2016 - 1 min read</p> <h1 class="post-title">倚着石头晒太阳</h1> <p class="meta"></p> <div class="tag-list"> <a class="tag" href="/tags/Poem/">Poem</a> </div> <div class="post-content">  <p>我想倚着石头
晒晒太阳
山风吹着面庞
除了草木莎莎
没个其他声响
一会儿驱赶下飞虫
一会儿挠挠裤裆
就这么晕晕忽忽
睡他个一天半晌</p>  </div> </article>  </main> <footer class="footer"> <span>Field notes and essays on life, software, and tiny rituals.</span> <span>Copyright 2026 Zhang Hua Feng/張華楓&#39;s Notes</span> </footer> </div> </body></html>
